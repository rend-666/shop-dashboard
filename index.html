<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shop Admin</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0b0c10;
    --surface: #13151c;
    --surface2: #1a1d27;
    --border: #252836;
    --accent: #5865f2;
    --green: #57f287;
    --red: #ed4245;
    --yellow: #fee75c;
    --text: #e8eaf0;
    --muted: #6b6f85;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Syne', sans-serif; min-height: 100vh; }

  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 18px 32px;
    display: flex; align-items: center; gap: 14px;
  }
  .logo { width: 34px; height: 34px; background: var(--accent); border-radius: 9px; display:grid; place-items:center; font-size:16px; }
  header h1 { font-size: 1rem; font-weight: 800; letter-spacing: 0.04em; }
  .bot-status { margin-left: auto; font-size: 0.72rem; font-family: 'JetBrains Mono', monospace; display:flex; align-items:center; gap:6px; color: var(--muted); }
  .dot { width:8px; height:8px; border-radius:50%; background:var(--muted); }
  .dot.online { background:var(--green); box-shadow:0 0 6px var(--green); }

  .api-bar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 10px 32px;
    display: flex; align-items: center; gap: 10px;
  }
  .api-bar label { font-size: 0.75rem; color: var(--muted); font-weight: 600; white-space: nowrap; }
  .api-bar input {
    background: var(--surface2); border: 1px solid var(--border); border-radius: 7px;
    color: var(--text); font-family: 'JetBrains Mono', monospace; font-size: 0.8rem;
    padding: 6px 12px; outline: none; width: 260px;
  }
  .api-bar input:focus { border-color: var(--accent); }
  .btn-sm {
    background: var(--surface2); border: 1px solid var(--border); border-radius: 7px;
    color: var(--muted); font-family: 'Syne', sans-serif; font-size: 0.78rem; font-weight: 700;
    padding: 6px 14px; cursor: pointer; transition: all 0.15s;
  }
  .btn-sm:hover { border-color: var(--accent); color: var(--accent); }

  .tabs {
    display: flex;
    border-bottom: 1px solid var(--border);
    padding: 0 32px;
    background: var(--surface);
  }
  .tab {
    padding: 14px 20px; font-size: 0.82rem; font-weight: 700; cursor: pointer;
    color: var(--muted); border-bottom: 2px solid transparent; transition: all 0.15s;
    letter-spacing: 0.04em;
  }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  .content { padding: 28px 32px; max-width: 920px; }
  .panel { display: none; }
  .panel.active { display: block; }

  .section-header {
    display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px;
  }
  .section-header h2 { font-size: 1rem; font-weight: 800; }

  .btn-primary {
    background: var(--accent); color: #fff; border: none; border-radius: 8px;
    font-family: 'Syne', sans-serif; font-size: 0.82rem; font-weight: 700;
    padding: 9px 18px; cursor: pointer; transition: all 0.15s;
  }
  .btn-primary:hover { background: #4752c4; }

  /* Add form */
  .add-form {
    background: var(--surface); border: 1px solid var(--accent); border-radius: 12px;
    padding: 20px; margin-bottom: 18px; display: none;
    animation: fadeIn 0.2s ease;
  }
  .add-form.open { display: block; }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .form-full { grid-column: 1 / -1; }
  .add-form label { display: block; font-size: 0.72rem; font-weight: 700; color: var(--muted); margin-bottom: 5px; letter-spacing:0.06em; text-transform:uppercase; }
  .add-form input, .add-form textarea {
    width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px;
    color: var(--text); font-family: 'JetBrains Mono', monospace; font-size: 0.82rem;
    padding: 8px 12px; outline: none;
  }
  .add-form input:focus, .add-form textarea:focus { border-color: var(--accent); }
  .add-form textarea { resize: vertical; min-height: 60px; }
  .form-actions { display: flex; gap: 8px; margin-top: 14px; }

  /* Products */
  .product-grid { display: flex; flex-direction: column; gap: 10px; }

  .product-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
    padding: 16px 20px; display: flex; align-items: center; gap: 16px;
    animation: fadeIn 0.2s ease;
  }
  @keyframes fadeIn { from{opacity:0;transform:translateY(-4px)} to{opacity:1;transform:translateY(0)} }

  .product-info { flex: 1; min-width: 0; }
  .product-name { font-weight: 700; font-size: 0.95rem; margin-bottom: 3px; }
  .product-desc { font-size: 0.78rem; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .product-price {
    font-family: 'JetBrains Mono', monospace; font-size: 0.85rem; font-weight: 600;
    color: var(--green); white-space: nowrap;
  }
  .product-file {
    font-family: 'JetBrains Mono', monospace; font-size: 0.72rem; color: var(--muted);
    background: var(--surface2); padding: 3px 8px; border-radius: 5px;
    max-width: 180px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .btn-danger {
    background: none; border: 1px solid var(--border); border-radius: 7px;
    color: var(--muted); font-size: 0.8rem; padding: 6px 12px; cursor: pointer;
    transition: all 0.15s; font-family: 'Syne', sans-serif; font-weight: 700; white-space: nowrap;
  }
  .btn-danger:hover { border-color: var(--red); color: var(--red); background: #ed424210; }

  /* Orders */
  .orders-table { width: 100%; border-collapse: collapse; }
  .orders-table th {
    text-align: left; font-size: 0.7rem; font-weight: 700; color: var(--muted);
    letter-spacing: 0.1em; text-transform: uppercase; padding: 8px 12px;
    border-bottom: 1px solid var(--border);
  }
  .orders-table td {
    padding: 12px; font-size: 0.8rem; border-bottom: 1px solid var(--border);
    font-family: 'JetBrains Mono', monospace;
  }
  .orders-table tr:hover td { background: var(--surface); }

  .badge {
    display: inline-block; padding: 2px 10px; border-radius: 20px;
    font-size: 0.68rem; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase;
  }
  .badge.delivered { background: #57f28720; color: var(--green); }
  .badge.pending   { background: #fee75c20; color: var(--yellow); }
  .badge.unknown   { background: var(--surface2); color: var(--muted); }

  .empty-state {
    text-align: center; padding: 50px 20px; color: var(--muted); font-size: 0.85rem;
  }
  .empty-state .icon { font-size: 2.5rem; margin-bottom: 10px; }

  .refresh-btn {
    background: none; border: none; color: var(--muted); cursor: pointer;
    font-size: 0.82rem; padding: 4px 8px; border-radius: 6px; transition: color 0.15s;
    font-family: 'Syne', sans-serif; font-weight: 700;
  }
  .refresh-btn:hover { color: var(--text); }
</style>
</head>
<body>

<header>
  <div class="logo">🛒</div>
  <h1>Shop Admin</h1>
  <div class="bot-status">
    <div class="dot" id="statusDot"></div>
    <span id="statusText">Checking...</span>
  </div>
</header>

<div class="api-bar">
  <label>Bot URL</label>
  <input type="text" id="apiUrl" value="http://localhost:8080" placeholder="http://localhost:8080">
  <button class="btn-sm" onclick="checkHealth()">Connect</button>
</div>

<div class="tabs">
  <div class="tab active" onclick="switchTab('products')">Products</div>
  <div class="tab" onclick="switchTab('orders')">Orders</div>
</div>

<div class="content">

  <!-- PRODUCTS -->
  <div class="panel active" id="tab-products">
    <div class="section-header">
      <h2>Products</h2>
      <button class="btn-primary" onclick="toggleAddForm()">＋ Add Product</button>
    </div>

    <div class="add-form" id="addForm">
      <div class="form-grid">
        <div>
          <label>Product Name</label>
          <input type="text" id="f-name" placeholder="My eBook">
        </div>
        <div>
          <label>Price (e.g. 9.99)</label>
          <input type="text" id="f-price" placeholder="9.99">
        </div>
        <div>
          <label>Currency</label>
          <input type="text" id="f-currency" placeholder="USD" value="USD">
        </div>
        <div>
          <label>File Path (e.g. files/book.pdf)</label>
          <input type="text" id="f-file" placeholder="files/my-product.pdf">
        </div>
        <div class="form-full">
          <label>Description</label>
          <textarea id="f-desc" placeholder="Short description shown in the Discord shop..."></textarea>
        </div>
      </div>
      <div class="form-actions">
        <button class="btn-primary" onclick="addProduct()">Save Product</button>
        <button class="btn-sm" onclick="toggleAddForm()">Cancel</button>
      </div>
    </div>

    <div class="product-grid" id="productList">
      <div class="empty-state"><div class="icon">📦</div>Loading...</div>
    </div>
  </div>

  <!-- ORDERS -->
  <div class="panel" id="tab-orders">
    <div class="section-header">
      <h2>Orders</h2>
      <button class="refresh-btn" onclick="loadOrders()">🔄 Refresh</button>
    </div>
    <div id="ordersList">
      <div class="empty-state"><div class="icon">🧾</div>Loading...</div>
    </div>
  </div>

</div>

<script>
const getUrl = () => document.getElementById('apiUrl').value.trim();

async function checkHealth() {
  const dot = document.getElementById('statusDot');
  const txt = document.getElementById('statusText');
  try {
    const r = await fetch(`${getUrl()}/health`);
    const d = await r.json();
    dot.className = d.bot_ready ? 'dot online' : 'dot';
    txt.textContent = d.bot_ready ? 'Bot online' : 'Bot starting...';
  } catch {
    dot.className = 'dot';
    txt.textContent = 'Unreachable';
  }
}

function switchTab(name) {
  ['products','orders'].forEach((n,i) => {
    document.querySelectorAll('.tab')[i].classList.toggle('active', n === name);
    document.getElementById(`tab-${n}`).classList.toggle('active', n === name);
  });
  if (name === 'orders') loadOrders();
}

// ── Products ──────────────────────────────────────────────────────────────────
async function loadProducts() {
  try {
    const r = await fetch(`${getUrl()}/products`);
    renderProducts(await r.json());
  } catch {
    document.getElementById('productList').innerHTML =
      '<div class="empty-state"><div class="icon">⚠️</div>Cannot reach bot server.</div>';
  }
}

function renderProducts(list) {
  const el = document.getElementById('productList');
  if (!list.length) {
    el.innerHTML = '<div class="empty-state"><div class="icon">📦</div>No products yet. Add one above!</div>';
    return;
  }
  el.innerHTML = list.map(p => `
    <div class="product-card">
      <div class="product-info">
        <div class="product-name">${x(p.name)}</div>
        <div class="product-desc">${x(p.description)}</div>
      </div>
      <div class="product-price">${x(p.price)} ${x(p.currency)}</div>
      <div class="product-file" title="${x(p.file)}">${x(p.file)}</div>
      <button class="btn-danger" onclick="deleteProduct('${x(p.id)}')">Delete</button>
    </div>
  `).join('');
}

function toggleAddForm() {
  document.getElementById('addForm').classList.toggle('open');
}

async function addProduct() {
  const body = {
    name:        document.getElementById('f-name').value.trim(),
    description: document.getElementById('f-desc').value.trim(),
    price:       document.getElementById('f-price').value.trim(),
    currency:    document.getElementById('f-currency').value.trim() || 'USD',
    file:        document.getElementById('f-file').value.trim(),
  };
  if (!body.name || !body.price || !body.file) { alert('Name, price, and file are required.'); return; }
  await fetch(`${getUrl()}/products`, {
    method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(body),
  });
  document.getElementById('addForm').classList.remove('open');
  ['f-name','f-desc','f-price','f-file'].forEach(id => document.getElementById(id).value = '');
  loadProducts();
}

async function deleteProduct(id) {
  if (!confirm('Delete this product?')) return;
  await fetch(`${getUrl()}/products/${id}`, { method: 'DELETE' });
  loadProducts();
}

// ── Orders ────────────────────────────────────────────────────────────────────
async function loadOrders() {
  const el = document.getElementById('ordersList');
  try {
    const r = await fetch(`${getUrl()}/orders`);
    const orders = await r.json();
    if (!orders.length) {
      el.innerHTML = '<div class="empty-state"><div class="icon">🧾</div>No orders yet.</div>';
      return;
    }
    const rows = [...orders].reverse().map(o => `<tr>
      <td>${x(o.order_ref?.slice(0,8) ?? '—')}</td>
      <td>${x(o.product_id)}</td>
      <td>${x(o.discord_user_id)}</td>
      <td><span class="badge ${o.status==='delivered'?'delivered':o.status==='pending'?'pending':'unknown'}">${x(o.status)}</span></td>
      <td>${x(o.created_at?.slice(0,19) ?? '—')}</td>
    </tr>`).join('');
    el.innerHTML = `<table class="orders-table">
      <thead><tr><th>Ref</th><th>Product ID</th><th>User ID</th><th>Status</th><th>Date (UTC)</th></tr></thead>
      <tbody>${rows}</tbody></table>`;
  } catch {
    el.innerHTML = '<div class="empty-state"><div class="icon">⚠️</div>Cannot reach bot server.</div>';
  }
}

function x(s) {
  return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

checkHealth();
loadProducts();
setInterval(checkHealth, 15000);
</script>
</body>
</html>
